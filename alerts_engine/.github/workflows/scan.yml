name: El-Mordjene News Agent - Scan

on:
  # Run once every 4 hours (fits free tier, gives time to review alerts)
  schedule:
    - cron: '0 */4 * * *'

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore agent state
        uses: actions/cache@v4
        with:
          path: |
            agent.db
            agent_state.json
          key: elmordjene-agent-${{ hashFiles('config.py') }}-v1
          restore-keys: |
            elmordjene-agent-${{ hashFiles('config.py') }}-
            elmordjene-agent-

      - name: Run news scan and handle commands
        id: run-agent
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_PUBLISH_WEBHOOK_URL: ${{ secrets.WP_PUBLISH_WEBHOOK_URL }}
          WP_PUBLISH_SECRET: ${{ secrets.WP_PUBLISH_SECRET }}
        run: python main.py --once

      - name: Save agent state to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            agent.db
            agent_state.json
          key: elmordjene-agent-${{ hashFiles('config.py') }}-v1
